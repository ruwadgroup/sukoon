<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sukoon — Remove background music, keep speech clear</title>
    <meta
      name="description"
      content="Sukoon removes background music from videos and audio while keeping speech clear. Privacy-first and open source. Haram music remover for vlogs, lectures, and nasheeds."
    />

  <body>
    <main>
      <h1>Sukoon · سكون</h1>
      <p>Upload a file to remove its background music. Speech is kept.</p>
      <input id="file" type="file" accept="audio/*,video/*" />
      <p>
        <small>Audio is processed in the cloud and deleted immediately. Nothing is stored.</small>
      </p>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
