name: Bug report
description: Something is broken or not working the way you expect.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! If the issue is that **music wasn't fully removed** or **a voice sounded
        distorted**, the "Music-removal quality" form is a better fit.
  - type: dropdown
    id: where
    attributes:
      label: Where did this happen?
      description: Pick the part of Sukoon you were using. Not sure? Choose "Not sure".
      options:
        - Browser extension (Chrome / Edge / Brave)
        - Command-line tool (the `sukoon` command)
        - Desktop app
        - Website
        - Documentation
        - Not sure
    validations:
      required: true
  - type: input
    id: site
    attributes:
      label: Which website? (browser extension only)
      placeholder: "YouTube, Instagram, Facebook, X, …"
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: How can we reproduce it?
      placeholder: |
        1. Opened a YouTube video
        2. Turned Sukoon on
        3. …
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Your setup
      description: Browser + version for the extension, or your OS + Sukoon version for the apps.
      placeholder: "Chrome 124 on Windows 11   ·   macOS 14, sukoon 0.1.0-alpha"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Screenshots or console logs (optional)
      description: "For the extension, errors show under: right-click → Inspect → Console."
      render: shell
