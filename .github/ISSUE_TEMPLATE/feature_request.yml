name: Feature request
description: Suggest a capability or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: What do you want Sukoon to do that it doesn't today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see? (optional)
  - type: dropdown
    id: where
    attributes:
      label: Which part of Sukoon?
      options:
        - Browser extension
        - Command-line tool
        - Desktop app
        - Website
        - Documentation
        - Something else / not sure
    validations:
      required: true
  - type: checkboxes
    id: principles
    attributes:
      label: One quick check
      options:
        - label: This doesn't ask Sukoon to block, skip, or mute ads. (Sukoon never touches ads — it only removes their background music, like everything else.)
          required: true
