name: Music-removal quality report
description: Tell us where music removal left too much, removed too much, or sounded off.
labels: ["eval", "quality"]
body:
  - type: markdown
    attributes:
      value: |
        These reports are the **most valuable** thing you can send us. Be specific, and if you can,
        attach a short clip — or a public link with timestamps.
  - type: dropdown
    id: where
    attributes:
      label: Where did you use Sukoon?
      description: This tells us which engine was running — you don't need to know its name.
      options:
        - Browser extension (real-time, on a website)
        - Command-line tool or desktop app (cleaning a saved file)
    validations:
      required: true
  - type: input
    id: content
    attributes:
      label: What were you listening to?
      placeholder: "vlog · lecture · nasheed · podcast · documentary · news"
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: What went wrong?
      options:
        - Music was still audible (not removed enough)
        - The voice sounded damaged, muffled, or robotic
        - Clicks, warble, or an "underwater" sound
        - A sung vocal / nasheed was affected
        - Audio and video were out of sync
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: What did you hear?
      description: Timestamps, what was wrong, and what you expected to hear instead.
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Your setup (optional)
      placeholder: "Chrome on Windows 11   ·   macOS, sukoon 0.1.0-alpha"
