name: Stale

on:
  schedule:
    - cron: "30 1 * * *"

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,proposal,eval,quality,security"
          stale-issue-message: >
            This issue has been inactive for 60 days. It will be closed in 14 days if there is no
            further activity. If it's still relevant, a comment keeps it open.
          stale-pr-message: >
            This PR has been inactive for 60 days and will be closed in 14 days without further
            activity.
